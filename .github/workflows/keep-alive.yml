name: keep-alive

# Two responsibilities:
#
# 1. Daily ping to /karte → triggers a Supabase rpc → resets the
#    7-day "free project pauses" timer.
#
# 2. Monthly heartbeat commit (toggles a single character in
#    .github/heartbeat.txt) → resets GitHub's 60-day "scheduled
#    workflow auto-disabled" timer. Without this, the cron itself
#    would die after 2 months of zero repo activity.
#
# Cost: a few seconds/day. The combined system is fully self-
# sustaining; you never need to touch GitHub or Supabase to keep
# the live site alive.

on:
  schedule:
    # Two slots per day. If GitHub fails to allocate a runner for one
    # slot (rare but does happen on free-tier), the other one compensates
    # — Supabase only pauses after 7 consecutive days without a ping.
    - cron: "17 6 * * *"  # daily at 06:17 UTC
    - cron: "17 18 * * *" # daily at 18:17 UTC
  workflow_dispatch:

permissions:
  contents: write # needed for the heartbeat self-commit

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ping /karte (Supabase keep-alive)
        run: |
          set -euo pipefail
          URL="https://mietcheck-map.vercel.app/karte"
          status=$(curl -s -o /dev/null -w '%{http_code}' -L --max-time 30 "$URL")
          echo "Pinged $URL → HTTP $status"
          [[ "$status" =~ ^[23] ]]

      - name: Heartbeat (toggle every 30 days, GitHub keep-alive)
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          FILE=".github/heartbeat.txt"

          if [ -f "$FILE" ]; then
            last_ts=$(git log -1 --format=%ct -- "$FILE" 2>/dev/null || echo 0)
          else
            last_ts=0
          fi
          age_days=$(( ( $(date +%s) - last_ts ) / 86400 ))

          if [ "$age_days" -lt 30 ]; then
            echo "Heartbeat is $age_days day(s) old — skipping (toggles at 30)."
            exit 0
          fi

          # Toggle: empty file ↔ single "A"
          if [ -s "$FILE" ]; then
            : > "$FILE"
          else
            echo "A" > "$FILE"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: heartbeat $(date -u +%Y-%m-%d)"
          git push
          echo "Heartbeat toggled and pushed."
