name: keep-alive

# Pings the live site daily to keep Supabase from pausing the free
# project (which happens after 7 days of inactivity). The /karte
# request triggers a Supabase rpc call, which counts as activity.
#
# Cost: a single curl/day, well under the 2000 min/month free quota.
# Note: GitHub disables scheduled workflows after 60 days of zero
# repo activity. Any commit resets that timer.

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC (off-peak, off-hour)
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /karte
        run: |
          set -euo pipefail
          URL="https://mietcheck-map.vercel.app/karte"
          echo "Pinging $URL ..."
          status=$(curl -s -o /dev/null -w '%{http_code}' -L --max-time 30 "$URL")
          echo "HTTP $status"
          # 2xx and 3xx are both fine; 4xx/5xx fail the job so we get an alert.
          [[ "$status" =~ ^[23] ]]
