name: auto-ingest

# Phase 2.4 — Automated data refresh.
#
# Jobs:
#   1. ingest    — runs all ingestion scripts on a monthly schedule.
#                  Idempotent: re-running with unchanged source data
#                  upserts identical rows. Only the daily Mietspiegel
#                  Lookup (Wohnlagen-WFS) is heavy (~400k rows, ~10 min).
#
#   2. drift-check — daily, lightweight. Probes the IBB report URL and
#                    the Berlin Open Data dataset pages for new published
#                    versions. If a new version is detected, opens an issue
#                    so a human can update the script (URLs / format).
#
# Failure mode: a failing run automatically opens a GitHub issue with
# the failed step's logs, so problems surface without a paid alerting
# service. No external SaaS, no recurring cost.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   - NEXT_PUBLIC_SUPABASE_URL
#   - SUPABASE_SECRET_KEY
#
# To run on demand:
#   GitHub UI → Actions → auto-ingest → "Run workflow"

on:
  schedule:
    # Monthly on the 4th at 02:30 UTC. The 4th gives upstream sources a
    # buffer past month-start in case they publish on the 1st-3rd.
    - cron: "30 2 4 * *"
    # Daily drift-check at 05:42 UTC.
    - cron: "42 5 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "ingest"
        type: choice
        options:
          - ingest
          - drift-check

permissions:
  contents: read
  issues: write # to open a failure issue if something breaks

env:
  NODE_VERSION: "20"

jobs:
  ingest:
    name: Ingest all sources
    if: github.event.schedule == '30 2 4 * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'ingest')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run all ingestion scripts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          set -euo pipefail
          # Run each script independently so a single failure leaves us
          # with a partially-updated DB rather than an all-or-nothing miss.
          # The data sources are independent, so partial success is fine.
          fail=0
          for s in berlin-districts berlin-wohnlagen berlin-ibb berlin-mietspiegel-2024; do
            echo "::group::ingest:$s"
            if npx tsx "scripts/ingest/$s.ts"; then
              echo "✓ $s done"
            else
              echo "::error::ingest:$s failed"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `auto-ingest failed on ${new Date().toISOString().slice(0,10)}`,
              body: [
                'The monthly auto-ingest workflow failed.',
                '',
                `Run: ${runUrl}`,
                '',
                'Common causes:',
                '- Source URL changed (IBB publishes new yearly report at a new URL)',
                '- Source format changed (column order, classification scheme)',
                '- Supabase credentials rotated',
                '- WFS endpoint hiccup (re-run usually fixes)',
                '',
                'Check the run logs and either fix the script or close as transient.',
              ].join('\n'),
              labels: ['auto-ingest', 'bug'],
            });

  drift-check:
    name: Probe upstream for new publications
    if: github.event.schedule == '42 5 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'drift-check')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Check for new IBB report and Mietspiegel
        id: probe
        run: |
          set -euo pipefail
          notes=""

          # IBB report — currently 2025. If 2026/2027 PDF appears, flag it.
          for year in 2026 2027 2028; do
            url="https://www.ibb.de/media/dokumente/publikationen/berliner-wohnungsmarktbericht/wohnungsmarktbericht-${year}.pdf"
            if curl -sSL -o /dev/null --max-time 20 -w '%{http_code}\n' "$url" 2>/dev/null | grep -q '^200$'; then
              notes="$notes- IBB Wohnungsmarktbericht $year published: $url\n"
            fi
          done

          # Mietspiegel — currently 2024. Berlin republishes every 2 years.
          for year in 2026 2027 2028; do
            url="https://www.berlin.de/sen/wohnen/_assets/service/mietspiegel${year}.pdf"
            if curl -sSL -o /dev/null --max-time 20 -w '%{http_code}\n' "$url" 2>/dev/null | grep -q '^200$'; then
              notes="$notes- Berliner Mietspiegel $year published: $url\n"
            fi
          done

          if [ -n "$notes" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            {
              echo 'notes<<EOF'
              printf "$notes"
              echo EOF
            } >> $GITHUB_OUTPUT
            echo "Drift detected:"
            printf "$notes"
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "No new publications detected."
          fi

      - name: Open issue if drift detected
        if: steps.probe.outputs.drift_detected == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const notes = `${{ steps.probe.outputs.notes }}`;
            const date = new Date().toISOString().slice(0,10);
            const title = `New upstream data available (${date})`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-drift',
            });
            // Avoid spamming: only one open drift issue at a time.
            if (existing.length > 0) {
              core.info(`Existing drift issue #${existing[0].number} is still open — not opening another.`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                'The daily drift-check found new upstream data:',
                '',
                notes,
                'To incorporate:',
                '1. Bump the URL constant in the corresponding `scripts/ingest/*.ts`.',
                '2. Re-extract values if format changed (e.g. Mietspiegel: re-parse PDF and overwrite `scripts/ingest/data/berlin-mietspiegel-2024.json`, then rename column / migration if classes changed).',
                '3. Push — the next scheduled `auto-ingest` will pick up the new data.',
              ].join('\n'),
              labels: ['auto-ingest', 'data-drift'],
            });
